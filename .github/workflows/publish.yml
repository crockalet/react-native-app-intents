name: Publish

on:
  release:
    types:
      - published
  push:
    tags:
      - v*
      - "*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Update npm
        run: npm install --global npm@latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate package metadata
        id: package
        shell: bash
        run: |
          set -euo pipefail

          package_dir="packages/react-native"
          package_name="$(node -p "require('./${package_dir}/package.json').name")"
          package_version="$(node -p "require('./${package_dir}/package.json').version")"

          echo "name=${package_name}" >> "${GITHUB_OUTPUT}"
          echo "version=${package_version}" >> "${GITHUB_OUTPUT}"

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"

            if [[ "${tag}" != "v${package_version}" && "${tag}" != "${package_version}" ]]; then
              echo "Tag ${tag} does not match package version ${package_version}." >&2
              exit 1
            fi
          fi

          if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
            echo "exists=true" >> "${GITHUB_OUTPUT}"
            echo "${package_name}@${package_version} is already published; skipping publish."
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Pack dry run
        if: steps.package.outputs.exists != 'true'
        run: npm pack --dry-run ./packages/react-native

      - name: Publish to npm
        if: steps.package.outputs.exists != 'true'
        run: npm publish ./packages/react-native --access public --provenance
